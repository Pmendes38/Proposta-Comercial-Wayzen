<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wayzen: Proposta Comercial</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#050008;
  --surface:#120020;
  --surface2:#0d0018;
  --accent:#9400d3;
  --accent2:#cc00ff;
  --accent-soft:rgba(148,0,211,0.12);
  --accent-border:rgba(148,0,211,0.5);
  --text:#f0e8ff;
  --muted:#8070a0;
  --divider:rgba(100,60,140,0.25);
  --font-h:'Syne',sans-serif;
  --font-b:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);}
#root{height:100%;overflow:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--accent-border);border-radius:2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(148,0,211,.4)}50%{box-shadow:0 0 0 8px rgba(148,0,211,0)}}
@keyframes flowRight{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

.au{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both}
.au1{animation:fadeUp .55s .1s cubic-bezier(.16,1,.3,1) both}
.au2{animation:fadeUp .55s .2s cubic-bezier(.16,1,.3,1) both}
.au3{animation:fadeUp .55s .3s cubic-bezier(.16,1,.3,1) both}
.au4{animation:fadeUp .55s .4s cubic-bezier(.16,1,.3,1) both}
.ai{animation:fadeIn .4s ease both}
.al{animation:slideLeft .5s cubic-bezier(.16,1,.3,1) both}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:260px;min-width:260px;background:var(--surface2);border-right:1px solid var(--divider);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.scroll{overflow-y:auto;overflow-x:hidden;}

/* FORM ELEMENTS */
.fg{margin-bottom:18px;}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--divider);border-radius:8px;color:var(--text);padding:11px 15px;font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.fi:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px rgba(148,0,211,.08);}
.fi::placeholder{color:rgba(255,255,255,.18);}
textarea.fi{resize:vertical;min-height:72px;}
select.fi option{background:#120020;}

input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:rgba(148,0,211,.2);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 10px rgba(148,0,211,.6);transition:transform .2s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-b);font-size:13px;font-weight:600;transition:all .2s;text-decoration:none;}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 24px rgba(148,0,211,.35);}
.btn-p:hover{box-shadow:0 0 40px rgba(148,0,211,.5);transform:translateY(-1px);}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--divider);}
.btn-s:hover{border-color:var(--accent-border);background:var(--accent-soft);}
.btn-g{background:transparent;color:var(--muted);border:none;padding:8px 12px;}
.btn-g:hover{color:var(--text);background:rgba(255,255,255,.05);}
.btn-sm{padding:7px 16px;font-size:12px;}
.btn-lg{padding:15px 36px;font-size:15px;font-weight:700;}
.btn-full{width:100%;}

/* MISC */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.05em;}
.ba{background:rgba(148,0,211,.15);color:var(--accent2);border:1px solid var(--accent-border);}
.bn{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--divider);}
.bok{background:rgba(0,200,100,.1);color:#00c864;border:1px solid rgba(0,200,100,.2);}
.bw{background:rgba(220,140,0,.1);color:#dc8c00;border:1px solid rgba(220,140,0,.2);}
.br{background:rgba(220,0,60,.1);color:#dc003c;border:1px solid rgba(220,0,60,.2);}
.bcom{background:rgba(0,180,255,.1);color:#00b4ff;border:1px solid rgba(0,180,255,.2);}
.divider{height:1px;background:var(--divider);margin:18px 0;}
.card{background:var(--surface);border:1px solid var(--divider);border-radius:12px;padding:20px;}
.glow-text{background:linear-gradient(135deg,#cc00ff,#9400d3,#cc00ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;}

/* SLIDE PRESENTATION */
.slide{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;}
.slide-bg{position:absolute;inset:0;pointer-events:none;z-index:0;}
.slide-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;}

/* NAV */
.top-bar{padding:12px 28px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;background:rgba(5,0,8,.85);backdrop-filter:blur(12px);}

/* LOGO */
.wz-logo{display:flex;align-items:center;gap:10px;}
.wz-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(148,0,211,.4);}

/* STEP INDICATOR */
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--divider);cursor:pointer;transition:all .25s;}
.step-dot.done{background:rgba(148,0,211,.4);}
.step-dot.active{background:var(--accent);width:22px;border-radius:4px;box-shadow:0 0 8px var(--accent);}

/* FORM PHASE */
.form-section{padding:32px;}
.form-title{font-family:var(--font-h);font-size:clamp(1.4rem,2.5vw,2rem);font-weight:800;margin-bottom:6px;}
.form-sub{color:var(--muted);font-size:14px;margin-bottom:28px;}

/* SIDEBAR NAV */
.sn-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s;}
.sn-item:hover{background:rgba(148,0,211,.08);}
.sn-item.active{background:var(--accent-soft);}
.sn-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* DIAGNOSIS */
.diag-card{background:var(--surface);border:1px solid var(--divider);border-radius:10px;padding:16px;margin-bottom:10px;}
.diag-card.danger{border-left:3px solid #dc003c;}
.diag-card.warn{border-left:3px solid #dc8c00;}
.diag-card.ok{border-left:3px solid #00c864;}

/* PRESENTATION SLIDES */
.pres-nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:100;background:rgba(5,0,8,.7);backdrop-filter:blur(10px);padding:8px 16px;border-radius:100px;border:1px solid var(--divider);}
.prev-btn,.next-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--divider);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.prev-btn:hover,.next-btn:hover{border-color:var(--accent-border);background:var(--accent-soft);}
.slide-counter{font-size:11px;color:var(--muted);font-family:var(--font-h);font-weight:600;min-width:40px;text-align:center;}

/* PLAN CARDS */
.plan{background:var(--surface);border:2px solid var(--divider);border-radius:14px;padding:24px;cursor:pointer;transition:all .25s;position:relative;}
.plan:hover{border-color:var(--accent-border);transform:translateY(-3px);}
.plan.sel{border-color:var(--accent);box-shadow:0 0 30px rgba(148,0,211,.2);}
.plan.sel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:14px 14px 0 0;}

/* CHECKLIST */
.ci{display:flex;align-items:flex-start;gap:9px;padding:5px 0;}
.ci-icon{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:rgba(148,0,211,.15);border:1px solid var(--accent-border);}

/* HERO BG EFFECTS */
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}

/* FORM GRID */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}

/* RANGE GROUP */
.rg{margin-bottom:22px;}
.rg-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.rg-label{font-size:12px;color:var(--muted);font-weight:500;}
.rg-val{font-family:var(--font-h);font-weight:700;font-size:16px;color:var(--accent2);}
.rg-hint{font-size:11px;color:var(--muted);margin-top:5px;}

/* DIAG TABS */
.diag-tab-bar{display:flex;overflow-x:auto;border-bottom:1px solid var(--divider);}
.diag-tab-bar::-webkit-scrollbar{height:3px;}

/* TAG SELECTOR */
.tag{padding:5px 12px;border-radius:6px;font-size:11px;background:rgba(255,255,255,.04);border:1px solid var(--divider);color:var(--muted);cursor:pointer;transition:all .15s;font-weight:500;}
.tag.on{background:rgba(148,0,211,.15);border-color:var(--accent-border);color:var(--text);}

/* TIMELINE */
.tl{display:flex;position:relative;gap:0;}
.tl::before{content:'';position:absolute;top:24px;left:24px;right:24px;height:2px;background:var(--divider);z-index:0;}
.tl-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.tl-dot{width:48px;height:48px;border-radius:50%;background:var(--surface);border:2px solid var(--divider);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;font-size:13px;color:var(--muted);transition:all .3s;}
.tl-dot.act{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px rgba(148,0,211,.3);}

/* TEAM MEMBER CARD WITH HOVER */
.team-member-card{position:relative;cursor:pointer;}
.team-member-card .team-hover-card{
  position:absolute;
  bottom:calc(100% + 12px);
  left:50%;
  transform:translateX(-50%) translateY(8px);
  width:300px;
  background:linear-gradient(135deg,#1a0030,#0d001a);
  border:1px solid var(--accent-border);
  border-radius:16px;
  padding:20px;
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease,transform .25s cubic-bezier(.16,1,.3,1);
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px rgba(148,0,211,.2);
}
.team-member-card:hover .team-hover-card,
.team-member-card.open .team-hover-card{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}
.team-hover-card::after{
  content:'';
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  border:8px solid transparent;
  border-top-color:var(--accent-border);
}
.team-photo-placeholder{
  width:100%;
  aspect-ratio:4/3;
  border-radius:10px;
  background:linear-gradient(135deg,rgba(148,0,211,.2),rgba(204,0,255,.08));
  border:1px dashed var(--accent-border);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:11px;
  margin-bottom:14px;
  overflow:hidden;
  position:relative;
}
.team-photo-placeholder img{
  width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:10px;
}

/* JOURNEY FLOW */
.journey-stage{
  position:relative;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--divider);
  background:var(--surface);
  transition:border-color .2s,transform .2s;
  cursor:default;
}
.journey-stage:hover{border-color:var(--accent-border);transform:translateY(-2px);}
.journey-arrow{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  color:var(--accent-border);
  flex-shrink:0;
}

/* PRESENCE HIGHLIGHT */
.presence-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:100px;
  background:rgba(0,200,100,.08);
  border:1px solid rgba(0,200,100,.2);
  color:#00c864;font-size:12px;font-weight:600;
}
.presence-dot{width:7px;height:7px;border-radius:50%;background:#00c864;animation:pulse 2s infinite;}

@media print{
  .no-print{display:none!important;}
  .print-show{display:block!important;}
  body{background:#fff;color:#000;overflow:auto;}
  #root{overflow:auto;height:auto;}
}
@media not print{.print-show{display:none!important;}}
</style>
</head>

const fmtBRL=v=>'R$ '+Math.round(v||0).toLocaleString('pt-BR');

function useLS(key,init){
  const [v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(val=>{sv(val);try{localStorage.setItem(key,JSON.stringify(val));}catch{};},[key]);
  return [v,set];
}

// ─── SVG ICONS ─────────────────────────────────────────────────────────────
function Ic({n,s=16,c='currentColor'}){

function WzLogo({size=24}){
  return(
    <div className="wz-logo">
      <div className="wz-icon" style={{width:size,height:size,borderRadius:Math.round(size*.25)}}>

function PhaseDiag({d,sd}){
  const u=(k,v)=>sd(p=>({...p,[k]:v}));
  const toggle=c=>u('canais',d.canais.includes(c)?d.canais.filter(x=>x!==c):[...d.canais,c]);
  const [tab,setTab]=useState('aquisicao');

  const gargalos=useMemo(()=>{
    const g=[];
    if(d.tempo>30) g.push({t:'Demora na Resposta',c:'danger',area:'Aquisição',desc:'Quando a resposta demora, a decisão vai para o concorrente.',acao:'SLA obrigatório + rotina de priorização. Meta: <5 min no comercial.'});
    if(d.semRetorno>40) g.push({t:'Follow-up Inexistente',c:'danger',area:'Aquisição',desc:'O contato não diz "não". Ele some. E o dinheiro vai junto.',acao:'Cadência obrigatória com no mínimo 5 touchpoints antes de arquivar.'});
    if(d.conversao<20) g.push({t:'Conversão Baixa',c:'warn',area:'Aquisição',desc:'Sem funil e scripts, a taxa tende a estagnar ou cair.',acao:'Playbook completo, scripts de objeções e metas por etapa do funil.'});
    if(!d.canais.length||d.canais.length===1) g.push({t:'Canal Único de Demanda',c:'warn',area:'Aquisição',desc:'Concentração de risco. Um canal parado interrompe toda a entrada.',acao:'Mapeamento e diversificação em pelo menos 3 canais.'});
    if(d.cac>0&&d.ticket>0&&d.cac>(d.ticket*0.3)) g.push({t:'CAC Elevado',c:'warn',area:'Aquisição',desc:'Custo de aquisição representa mais de 30% do ticket.',acao:'Revisão de canais pagos e ativação de canais orgânicos.'});
    if((d.desistencia||0)>15) g.push({t:'Desistência Alta',c:'danger',area:'Base Ativa',desc:`Taxa de ${d.desistencia||0}% indica problemas de entrega ou experiência.`,acao:'Diagnóstico de causa raiz: onboarding, qualidade, suporte.'});
    if((d.inadimplencia||0)>10) g.push({t:'Inadimplência Crítica',c:'danger',area:'Base Ativa',desc:`${d.inadimplencia||0}% compromete o fluxo de caixa.`,acao:'Régua de cobrança automática e revisão de política de crédito.'});
    if((d.churn||0)>5) g.push({t:'Churn Mensal Alto',c:'warn',area:'Base Ativa',desc:`Churn de ${d.churn||0}%: perde +${Math.round((d.churn||0)*12)}% da base em 1 ano.`,acao:'Programa de retenção ativa, pesquisa de saída e sucesso do cliente.'});
    if((d.recompra||0)<20) g.push({t:'Recompra Baixa',c:'warn',area:'LTV',desc:'Pouca receita recorrente da base. Aquisição é o único motor.',acao:'Esteira de produtos, upsell ativo e relacionamento pós-venda.'});
    if((d.indicacao||0)<15) g.push({t:'Indicação Quase Zero',c:'warn',area:'LTV',desc:'Clientes satisfeitos não estão sendo ativados como canal.',acao:'Programa de indicação estruturado com incentivos claros.'});
    if((d.nps||0)<30) g.push({t:'NPS Crítico',c:'danger',area:'Experiência',desc:`NPS de ${d.nps||0}: alto risco de saída, sem promotores ativos.`,acao:'Diagnóstico de jornada e plano de recuperação de detratores.'});
    if((d.nps||0)>=30&&(d.nps||0)<50) g.push({t:'NPS em Zona de Melhoria',c:'warn',area:'Experiência',desc:`NPS de ${d.nps||0}: espaço relevante para melhorar experiência.`,acao:'Mapeamento de pontos de atrito e ações pontuais.'});
    if((d.tempoFechamento||0)>14) g.push({t:'Ciclo de Fechamento Longo',c:'warn',area:'Operacional',desc:`Ciclo de ${d.tempoFechamento||0} dias: falta urgência ou cadência.`,acao:'Scripts de fechamento e follow-up estruturado pós-proposta.'});
    if((d.equipe||0)===0) g.push({t:'Sem Time Comercial',c:'warn',area:'Operacional',desc:'Crescimento limitado à capacidade do dono.',acao:'Estruturação do primeiro vendedor com playbook e metas.'});
    if(g.length===0) g.push({t:'Base com Potencial Real',c:'ok',area:'Geral',desc:'Números indicam base razoável. Foco em conversão e LTV.',acao:'Estabilização e governança. Próximo: LTV e reativação de base.'});
    return g;
  },[d]);

  const recAtual=d.contatos*4.3*(d.conversao/100)*d.ticket;
  const perdaFollowup=d.contatos*4.3*(d.semRetorno/100)*d.ticket*.12;
  const baseAtiva=d.baseAlunos||0;
  const recBase=baseAtiva*(d.mensalidade||d.ticket||0);
  const perdaDesist=baseAtiva*(d.desistencia||0)/100*(d.mensalidade||d.ticket||0);
  const perdaInadin=recBase*(d.inadimplencia||0)/100;
  const ltv=(d.mensalidade||d.ticket||0)*Math.max(1,12-(d.churn||0)/100*12);

  const scoreItems=[
    {nome:'Velocidade de resposta',val:d.tempo<=5?100:d.tempo<=30?70:d.tempo<=120?40:10},
    {nome:'Follow-up',val:d.semRetorno<=20?100:d.semRetorno<=40?60:d.semRetorno<=60?30:10},
    {nome:'Conversão',val:d.conversao>=40?100:d.conversao>=25?75:d.conversao>=15?50:25},
    {nome:'Retenção',val:(d.desistencia||0)<=5?100:(d.desistencia||0)<=10?70:(d.desistencia||0)<=20?40:15},
    {nome:'Inadimplência',val:(d.inadimplencia||0)<=3?100:(d.inadimplencia||0)<=7?70:(d.inadimplencia||0)<=15?40:15},
    {nome:'NPS',val:(d.nps||0)>=70?100:(d.nps||0)>=50?75:(d.nps||0)>=30?50:20},
    {nome:'Indicação',val:(d.indicacao||0)>=30?100:(d.indicacao||0)>=15?70:(d.indicacao||0)>=5?40:10},
    {nome:'Recompra',val:(d.recompra||0)>=40?100:(d.recompra||0)>=25?70:(d.recompra||0)>=10?40:10},
  ];
  const scoreGeral=Math.round(scoreItems.reduce((a,x)=>a+x.val,0)/scoreItems.length);
  const scoreCor=scoreGeral>=70?'#00c864':scoreGeral>=45?'#dc8c00':'#dc003c';

  const TABS=[
    {id:'aquisicao',label:'📥 Aquisição'},
    {id:'base',label:'👥 Base Ativa'},
    {id:'ltv',label:'♻️ LTV / Recompra'},
    {id:'operacional',label:'⚙️ Operacional'},
    {id:'experiencia',label:'⭐ Experiência'},
    {id:'painel',label:'📊 Painel Geral'},
  ];
  const ST=({children})=>(<div style={{fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:14,fontWeight:600,paddingBottom:8,borderBottom:'1px solid var(--divider)'}}>{children}</div>);

  return(
    <div>
      <div className="form-section" style={{paddingBottom:0}}>
        <div className="au"><span className="badge ba" style={{marginBottom:12}}>Passo 3 de 3 · Diagnóstico Completo</span></div>

        <p className="form-sub au2">Diagnóstico de ponta a ponta: aquisição, base ativa, LTV, operação e experiência.</p>
      </div>
      <div style={{padding:'0 32px',borderBottom:'1px solid var(--divider)',display:'flex',gap:0,overflowX:'auto'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'10px 18px',background:'none',border:'none',borderBottom:`2px solid ${tab===t.id?'var(--accent)':'transparent'}`,color:tab===t.id?'var(--text)':'var(--muted)',fontFamily:'var(--font-b)',fontSize:12,fontWeight:tab===t.id?600:400,cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap',marginBottom:-1}}>{t.label}</button>
        ))}
      </div>
      <div style={{padding:'24px 32px 40px'}}>
        {tab==='aquisicao'&&(
          <div key="aq" className="ai"><div className="fg2">
            <div>
              <ST>Entrada de Demanda</ST>
              <Slider label="Contatos por semana" min={5} max={500} value={d.contatos} onChange={v=>u('contatos',v)} hint="Somando todos os canais."/>
              <div className="fg"><label className="fl">Canais Ativos</label><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{CANAIS.map(c=><span key={c} className={`tag ${d.canais.includes(c)?'on':''}`} onClick={()=>toggle(c)}>{c}</span>)}</div></div>
              <ST>Velocidade e Atendimento</ST>
              <Slider label="Tempo médio de 1ª resposta (min)" min={1} max={480} value={d.tempo} onChange={v=>u('tempo',v)} unit="min" hint="1º atendimento ao lead novo."/>
              <Slider label="Contatos sem retorno (%)" min={0} max={100} value={d.semRetorno} onChange={v=>u('semRetorno',v)} hint="Leads que somem após o 1º atendimento."/>
              <Field label="CAC: Custo por Cliente Adquirido (R$)"><input className="fi" type="number" placeholder="Ex.: 450" value={d.cac||''} onChange={e=>u('cac',Number(e.target.value))}/></Field>
            </div>
            <div>
              <ST>Conversão e Financeiro</ST>
              <Slider label="Taxa de conversão (%)" min={1} max={80} value={d.conversao} onChange={v=>u('conversao',v)} unit="%" hint="Use estimativa honesta se não mede."/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <Field label="Ticket Médio (R$)"><input className="fi" type="number" placeholder="1500" value={d.ticket||''} onChange={e=>u('ticket',Number(e.target.value))}/></Field>
                <Field label="Ciclo de Decisão (dias)"><input className="fi" type="number" placeholder="7" value={d.ciclo||''} onChange={e=>u('ciclo',Number(e.target.value))}/></Field>

              <Field label="Propostas enviadas por semana"><input className="fi" type="number" placeholder="Ex.: 12" value={d.propostas||''} onChange={e=>u('propostas',Number(e.target.value))}/></Field>
              <Field label="Principal motivo de perda de leads"><select className="fi" value={d.motivoPerda||''} onChange={e=>u('motivoPerda',e.target.value)}><option value="">Selecione</option><option>Preço / valor percebido</option><option>Demora no atendimento</option><option>Falta de follow-up</option><option>Concorrente mais rápido</option><option>Falta de urgência do lead</option><option>Processo consultivo longo demais</option><option>Produto/oferta não adequada</option><option>Não sei / não rastreamos</option></select></Field>
              <div style={{background:'var(--surface)',border:'1px solid var(--divider)',borderRadius:10,padding:'14px'}}>

              <Field label="Oferta de renovação ou fidelização?"><select className="fi" value={d.fidelizacao||''} onChange={e=>u('fidelizacao',e.target.value)}><option value="">Selecione</option><option>Sim, plano anual ou fidelidade</option><option>Sim, mas só quando o cliente pede</option><option>Não temos</option></select></Field>
              <div style={{background:'var(--surface)',border:'1px solid var(--divider)',borderRadius:10,padding:'14px'}}>

                {[{l:'LTV por cliente',v:fmtBRL(ltv),accent:true},{l:'Receita de indicações/mês',v:fmtBRL(recAtual*(d.indicacao||0)/100)},{l:'Receita de recompra/mês',v:fmtBRL(recBase*(d.recompra||0)/100)},{l:'Tempo médio de base',v:`${d.tempoMedio||'-'} meses`}].map(x=>(<div key={x.l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--divider)'}}><span style={{fontSize:12,color:'var(--muted)'}}>{x.l}</span><span style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:13,color:x.accent?'var(--accent2)':'var(--text)'}}>{x.v}</span></div>))}

              <Field label="Script / playbook documentado?"><select className="fi" value={d.playbook||''} onChange={e=>u('playbook',e.target.value)}><option value="">Selecione</option><option>Sim, documentado e treinado</option><option>Sim, mas cada um faz do seu jeito</option><option>Informal, na cabeça do vendedor</option><option>Não temos</option></select></Field>
              <Field label="Meta de vendas definida?"><select className="fi" value={d.metas||''} onChange={e=>u('metas',e.target.value)}><option value="">Selecione</option><option>Sim, individual e coletiva com acompanhamento</option><option>Sim, mas sem acompanhamento</option><option>Meta geral sem detalhamento</option><option>Não trabalhamos com metas</option></select></Field>

              <Field label="Principal reclamação recorrente"><input className="fi" placeholder="Ex.: demora, falta de comunicação, resultado abaixo" value={d.reclamacao||''} onChange={e=>u('reclamacao',e.target.value)}/></Field>
            </div>
            <div>
              <ST>Onboarding e Jornada</ST>
              <Field label="Processo de onboarding estruturado?"><select className="fi" value={d.onboarding||''} onChange={e=>u('onboarding',e.target.value)}><option value="">Selecione</option><option>Sim, processo formal com checkpoints</option><option>Sim, mas informal</option><option>Apenas entrega do serviço</option><option>Não temos onboarding</option></select></Field>
              <Field label="Suporte ou atendimento pós-venda?"><select className="fi" value={d.suporte||''} onChange={e=>u('suporte',e.target.value)}><option value="">Selecione</option><option>Sim, canal dedicado com SLA</option><option>Sim, WhatsApp pessoal</option><option>Informal, sem canal definido</option><option>Não temos suporte estruturado</option></select></Field>
              <Field label="Acompanhamento de resultado do cliente?"><select className="fi" value={d.acompCliente||''} onChange={e=>u('acompCliente',e.target.value)}><option value="">Selecione</option><option>Sim, check-ins periódicos</option><option>Às vezes, sem frequência</option><option>Só quando o cliente reclama</option><option>Não temos acompanhamento</option></select></Field>
              <Field label="Cliente percebe evolução / resultado?"><select className="fi" value={d.percResultado||''} onChange={e=>u('percResultado',e.target.value)}><option value="">Selecione</option><option>Sim, com clareza: temos métricas</option><option>Acredito que sim, mas não medimos</option><option>Alguns sim, outros não</option><option>Não sabemos avaliar</option></select></Field>
            </div>
          </div></div>
        )}
        {tab==='painel'&&(
          <div key="painel" className="ai">
            <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:24,alignItems:'center',marginBottom:28,padding:'20px 24px',background:'var(--surface)',border:'1px solid var(--divider)',borderRadius:14}}>
              <div style={{textAlign:'center',minWidth:120}}>
                <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:'3.5rem',lineHeight:1,color:scoreCor}}>{scoreGeral}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:4,fontWeight:600}}>{scoreGeral>=70?'Boa Base':'Atenção Necessária'}</div>
                <div style={{width:80,height:4,background:'var(--divider)',borderRadius:2,margin:'8px auto 0',overflow:'hidden'}}><div style={{height:'100%',width:scoreGeral+'%',background:scoreCor,borderRadius:2}}/></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {scoreItems.map(s=>(<div key={s.nome} style={{display:'flex',alignItems:'center',gap:10}}><div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,color:'var(--muted)'}}>{s.nome}</span><span style={{fontSize:11,fontWeight:700,color:s.val>=70?'#00c864':s.val>=45?'#dc8c00':'#dc003c'}}>{s.val}</span></div><div style={{height:3,background:'var(--divider)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:s.val+'%',background:s.val>=70?'#00c864':s.val>=45?'#dc8c00':'#dc003c',borderRadius:2}}/></div></div></div>))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:24}}>
              {[{l:'Receita Mensal',v:fmtBRL(recAtual+recBase),ok:true},{l:'Perda por Follow-up',v:fmtBRL(perdaFollowup),danger:true},{l:'Perda por Desistência',v:fmtBRL(perdaDesist),danger:true},{l:'Perda por Inadimplência',v:fmtBRL(perdaInadin),danger:true}].map(x=>(<div key={x.l} style={{padding:'14px',background:x.danger?'rgba(220,0,60,.05)':'var(--surface)',border:`1px solid ${x.danger?'rgba(220,0,60,.2)':'var(--divider)'}`,borderRadius:10}}><div style={{fontSize:10,color:x.danger?'#dc003c':'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{x.l}</div><div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:'1.2rem',color:x.danger?'#dc003c':'var(--text)'}}>{x.v}</div></div>))}
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:14,fontWeight:600}}>Gargalos Identificados ({gargalos.length})</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {gargalos.map((g,i)=>(<div key={i} className={`diag-card ${g.c}`}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}><div style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:13}}>{g.t}</div><span style={{fontSize:9,padding:'2px 8px',borderRadius:100,fontWeight:600,background:g.c==='danger'?'rgba(220,0,60,.12)':g.c==='warn'?'rgba(220,140,0,.12)':'rgba(0,200,100,.12)',color:g.c==='danger'?'#dc003c':g.c==='warn'?'#dc8c00':'#00c864'}}>{g.area}</span></div><div style={{fontSize:12,color:'var(--muted)',marginBottom:6,lineHeight:1.5}}>{g.desc}</div><div style={{fontSize:11,borderTop:'1px solid var(--divider)',paddingTop:6}}><span style={{color:'var(--accent2)',fontWeight:600}}>Ação Wayzen: </span><span style={{color:'var(--muted)'}}>{g.acao}</span></div></div>))}
              </div>
            </div>
            <Field label="Observações finais do diagnóstico"><textarea className="fi" style={{minHeight:80}} placeholder="Notas do consultor, contexto adicional..." value={d.obsGeral||''} onChange={e=>u('obsGeral',e.target.value)}/></Field>

            {/* SELEÇÃO DO PLANO */}
            <div style={{marginTop:8,padding:'20px',background:'linear-gradient(135deg,rgba(148,0,211,.08),rgba(204,0,255,.04))',border:'1px solid var(--accent-border)',borderRadius:14}}>
              <div style={{fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--accent2)',marginBottom:6,fontWeight:700}}>Plano recomendado para este caso</div>
              <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.7,marginBottom:16}}>Com base no diagnóstico, escolha o plano que melhor se encaixa no momento e no potencial da escola. Ele será destacado na apresentação.</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                {PLANS.map(pl=>{
                  const sel=(d.planEscolhido||'padrao')===pl.id;
                  const quando={
                    entrada:'A escola está começando a estruturar o processo comercial ou tem volume baixo de leads. Melhor validar o método antes de escalar.',
                    padrao:'A escola já tem alguma demanda entrando, mas perde na conversão ou no follow-up. Momento certo para instalar processo e crescer.',
                    agressivo:'A escola tem volume, meta agressiva e quer crescimento acelerado. Disposição para investir mais e exigir resultado mais rápido.',
                  };
                  return(
                    <div key={pl.id} onClick={()=>u('planEscolhido',pl.id)} style={{padding:'14px',borderRadius:12,border:`2px solid ${sel?'var(--accent)':'var(--divider)'}`,background:sel?'rgba(148,0,211,.1)':'rgba(255,255,255,.02)',cursor:'pointer',transition:'all .2s',position:'relative'}}>
                      {sel&&<div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,var(--accent),var(--accent2))',borderRadius:'12px 12px 0 0'}}/>}
                      <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:13,marginBottom:4,color:sel?'var(--text)':'var(--muted)'}}>{pl.label}</div>
                      <div style={{fontSize:11,color:sel?'var(--accent2)':'var(--muted)',fontWeight:600,marginBottom:8}}>{pl.taxa} + {pl.loa}% LOA</div>
                      <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.5}}>{quando[pl.id]}</div>
                      {sel&&<div style={{marginTop:8,fontSize:10,color:'var(--accent2)',fontWeight:700,letterSpacing:'.06em'}}>SELECIONADO</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SLIDE HELPERS ──────────────────────────────────────────────────────────
function Orbs(){
  return(
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
      <div className="orb" style={{width:520,height:520,background:'radial-gradient(circle,rgba(148,0,211,.18),transparent 70%)',top:-120,right:-120}}/>
      <div className="orb" style={{width:320,height:320,background:'radial-gradient(circle,rgba(204,0,255,.10),transparent 70%)',bottom:110,left:-60}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(100,60,140,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(100,60,140,.05) 1px,transparent 1px)',backgroundSize:'50px 50px'}}/>
    </div>
  );
}

function SlideShell({badge,title,subtitle,children}){
  return(
    <div className="slide" style={{overflow:'auto'}}>
      <Orbs/>
      <div className="slide-content" style={{justifyContent:'flex-start',padding:'32px 80px 80px',maxWidth:1100,margin:'0 auto',width:'100%'}}>
        <div className="au" style={{marginBottom:8}}>{badge&&<span className="badge ba">{badge}</span>}</div>
        <h2 className="au1" style={{fontFamily:'var(--font-h)',fontSize:'clamp(1.8rem,3vw,2.6rem)',fontWeight:800,marginBottom:8,letterSpacing:'-.02em'}}>{title}</h2>
        {subtitle&&<p className="au2" style={{color:'var(--muted)',fontSize:14,marginBottom:24,lineHeight:1.7}}>{subtitle}</p>}
        <div className="au3">{children}</div>
      </div>
    </div>
  );
}

// ─── SLIDE 2: COMO TRABALHAMOS (PRESENÇA) ──────────────────────────────────

    <SlideShell
      badge="Como trabalhamos"

              <div style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:15,color:'#00c864',marginBottom:3}}>Operação dentro da empresa</div>

            </div>
          </div>
          {[
            {t:'Diagnóstico real, não formulário',d:'A gente entra e observa: como o lead chega, quem atende, quanto tempo demora, o que acontece depois. O problema fica claro em 2 dias, não em 2 semanas.'},
            {t:'Rotina instalada, não sugerida',d:'Ritual diário (15 min), ritual semanal (30 min), fechamento mensal. A rotina existe porque a gente está lá para cobrar e ajustar.'},
            {t:'Correção em tempo real',d:'Quando o script não converte, a gente muda amanhã. Quando a equipe não segue o funil, a gente conversa no dia. Não espera o próximo relatório.'},

    <SlideShell
      badge="Sua empresa ao final"
      title={<>Uma operação que <span className="glow-text">funciona sem improviso</span>.</>}
      subtitle="O dono para de apagar incêndio e passa a gerir por processo. A empresa ganha previsibilidade real."
    >
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:14}}>
        {blocks.map((b,i)=>(
          <div key={i} className="card" style={{borderRadius:16}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:15,marginBottom:6}}>{b.t}</div>
            <div style={{color:'var(--muted)',fontSize:12,lineHeight:1.7}}>{b.d}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'14px 18px',background:'var(--surface)',border:'1px solid var(--divider)',borderRadius:12,fontSize:12,color:'var(--muted)',lineHeight:1.8}}>
        <span style={{color:'var(--text)',fontWeight:700}}>Rotas de continuidade:</span> operação continua com Wayzen (com especialista em campo), manutenção híbrida com visitas programadas, ou transferência completa do método para seu time com treinamento.
      </div>
    </SlideShell>
  );
}

// ─── SLIDE 10 - INVESTIMENTO ─────────────────────────────────────────────────
function Slide10({selectedPlan,onSelect,diag}){
  const planId=diag.planEscolhido||selectedPlan||'padrao';
  const p=PLANS.find(x=>x.id===planId)||PLANS[1];
  const baseAlunos=diag.baseAlunos||100;
  const mensalidade=diag.mensalidade||diag.ticket||800;
  const margemPct=diag.margem||30;
  const [novosAlunos,setNovosAlunos]=useState(20);
  const recAtual=baseAlunos*mensalidade;
  const recAdicional=novosAlunos*mensalidade;
  const recTotal=recAtual+recAdicional;
  const lucroAtual=recAtual*(margemPct/100);
  const lucroTotal=recTotal*(margemPct/100);
  const lucroAdicional=lucroTotal-lucroAtual;
  const taxaMedia=(p.taxaMin+p.taxaMax)/2;
  const loaWayzen=lucroAdicional>0?lucroAdicional*(p.loa/100):0;
  const custoTotalWayzen=taxaMedia+loaWayzen;
  const retornoLiquidoEscola=lucroAdicional-custoTotalWayzen;
  const propWayzen=lucroAdicional>0?Math.min(100,(custoTotalWayzen/lucroAdicional)*100):0;
  const propEscola=Math.max(0,100-propWayzen);
  const quando={
    entrada:'Melhor para validar o processo. Volume baixo ou comercial ainda nao estruturado.',
    padrao:'Equilibrio ideal para a maioria dos casos. Execucao real com custo controlado.',
    agressivo:'Para crescimento acelerado. Meta agressiva e disposicao para investir mais.',
  };
  return(
    <SlideShell
      badge="Investimento"
      title={<>Taxa de operacao + <span className="glow-text">participacao no resultado</span>.</>}
      subtitle="Uma taxa fixa para viabilizar a presenca da equipe e uma participacao no lucro adicional gerado. Se a escola nao crescer, a Wayzen nao cobra LOA."
    >
      <div style={{display:'grid',gridTemplateColumns:'1.4fr .6fr',gap:16,alignItems:'start'}}>
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
            {PLANS.map(pl=>{
              const sel=pl.id===planId;
              return(
                <div key={pl.id} className={`plan ${sel?'sel':''}`} onClick={()=>onSelect(pl.id)} style={{borderRadius:14,padding:'18px'}}>
                  {pl.destaque&&<div className="badge ba" style={{position:'absolute',top:12,right:12,fontSize:9}}>Popular</div>}
                  <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:14,marginBottom:5}}>{pl.label}</div>
                  <div style={{color:'var(--muted)',fontSize:11,marginBottom:10,lineHeight:1.5}}>{quando[pl.id]}</div>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Taxa operacional</div>
                  <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:13,marginBottom:8}}>{pl.taxa}</div>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Participacao no LOA</div>
                  <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:14,color:'var(--accent2)'}}>{pl.loa}%</div>
                  {sel&&diag.planEscolhido===pl.id&&<div style={{marginTop:8,fontSize:9,color:'#00c864',fontWeight:700,letterSpacing:'.06em'}}>RECOMENDADO NO DIAGNOSTICO</div>}
                </div>
              );
            })}
          </div>
          <div className="card" style={{borderRadius:16}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:15,marginBottom:4}}>Quanto a escola ganha com a operacao rodando</div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6,marginBottom:18}}>Simulacao baseada nos dados do diagnostico. Ajuste o numero de novos alunos por mes para visualizar o impacto no resultado da escola e o custo da Wayzen.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20,padding:'14px',background:'rgba(255,255,255,.02)',border:'1px solid var(--divider)',borderRadius:10}}>
              {[{l:'Alunos ativos hoje',v:baseAlunos.toLocaleString('pt-BR')},{l:'Mensalidade media',v:fmtBRL(mensalidade)},{l:'Margem operacional',v:`${margemPct}%`}].map(x=>(
                <div key={x.l} style={{textAlign:'center'}}>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{x.l}</div>
                  <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:15}}>{x.v}</div>
                </div>
              ))}
            </div>
            <div style={{marginBottom:22}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>Novos alunos matriculados por mes com a Wayzen</span>
                <span style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:22,color:'var(--accent2)'}}>{novosAlunos}</span>
              </div>
              <input type="range" min={0} max={150} value={novosAlunos} onChange={e=>setNovosAlunos(Number(e.target.value))}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--muted)',marginTop:4}}>
                <span>0 alunos novos</span><span>150 alunos novos</span>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
              <div style={{padding:'18px',background:'rgba(0,200,100,.04)',border:'1px solid rgba(0,200,100,.15)',borderRadius:12}}>
                <div style={{fontSize:10,color:'#00c864',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}}>Receita da Escola</div>
                {[
                  {l:'Receita atual (base existente)',v:fmtBRL(recAtual)},
                  {l:'Receita adicional com novos alunos',v:fmtBRL(recAdicional),accent:true},
                  {l:'Receita total projetada',v:fmtBRL(recTotal),big:true},
                  {l:'Lucro adicional estimado',v:fmtBRL(lucroAdicional),green:true},
                ].map(x=>(
                  <div key={x.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid rgba(0,200,100,.08)'}}>
                    <span style={{fontSize:11,color:'var(--muted)',lineHeight:1.4,maxWidth:'55%'}}>{x.l}</span>
                    <span style={{fontFamily:'var(--font-h)',fontWeight:x.big?900:700,fontSize:x.big?16:12,color:x.green?'#00c864':x.accent?'var(--accent2)':'var(--text)'}}>{x.v}</span>
                  </div>
                ))}
                {lucroAdicional>0&&(
                  <div style={{marginTop:12,padding:'10px 12px',background:'rgba(0,200,100,.08)',borderRadius:8}}>
                    <div style={{fontSize:10,color:'#00c864',fontWeight:700,marginBottom:2}}>Retorno liquido da escola</div>
                    <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:20,color:'#00c864'}}>{fmtBRL(Math.max(0,retornoLiquidoEscola))}</div>
                    <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>por mes, apos descontar o custo Wayzen</div>
                  </div>
                )}
              </div>
              <div style={{padding:'18px',background:'var(--accent-soft)',border:'1px solid var(--accent-border)',borderRadius:12}}>
                <div style={{fontSize:10,color:'var(--accent2)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}}>Wayzen ({p.label})</div>
                {[
                  {l:'Taxa operacional (media)',v:fmtBRL(taxaMedia)},
                  {l:`Participacao no lucro adicional (${p.loa}%)`,v:fmtBRL(loaWayzen)},
                  {l:'Custo total Wayzen',v:fmtBRL(custoTotalWayzen),big:true},
                ].map(x=>(
                  <div key={x.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--divider)'}}>
                    <span style={{fontSize:11,color:'var(--muted)',lineHeight:1.4,maxWidth:'55%'}}>{x.l}</span>
                    <span style={{fontFamily:'var(--font-h)',fontWeight:x.big?900:700,fontSize:x.big?16:12,color:'var(--text)'}}>{x.v}</span>
                  </div>
                ))}
                <div style={{marginTop:12,padding:'10px 12px',background:'rgba(148,0,211,.12)',borderRadius:8,fontSize:11,color:'var(--muted)',lineHeight:1.6}}>
                  A participacao so existe se houver lucro adicional gerado. A porcentagem do LOA e fixa no plano e nunca aumenta alem do acordado.
                </div>
                {lucroAdicional>0&&(
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,fontWeight:600}}>Como o lucro adicional se divide</div>
                    <div style={{height:10,borderRadius:999,overflow:'hidden',background:'rgba(255,255,255,.06)',display:'flex'}}>
                      <div style={{width:`${propWayzen}%`,background:'linear-gradient(90deg,var(--accent),var(--accent2))',transition:'width .4s ease'}}/>
                      <div style={{flex:1,background:'rgba(0,200,100,.35)',transition:'flex .4s ease'}}/>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
                      <span style={{fontSize:10,color:'var(--accent2)',fontWeight:600}}>Wayzen: {Math.round(propWayzen)}%</span>
                      <span style={{fontSize:10,color:'#00c864',fontWeight:600}}>Escola: {Math.round(propEscola)}%</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div style={{fontSize:10,color:'var(--muted)',lineHeight:1.6,padding:'8px 12px',background:'rgba(255,255,255,.02)',borderRadius:8}}>
              Simulacao estimada com base nos dados do diagnostico. Os valores reais dependem do faturamento e da margem apurada no fechamento mensal via DRE ou demonstrativo gerencial.
            </div>
          </div>
        </div>
        <div style={{display:'grid',gap:12}}>
          <div className="card" style={{borderRadius:14,borderColor:'var(--accent-border)'}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:14,marginBottom:8}}>Como apuramos o LOA</div>
            <div style={{color:'var(--muted)',fontSize:12,lineHeight:1.8}}>Via DRE, balancete ou demonstrativo gerencial do financeiro ou contador. O contrato define o padrao minimo e o calendario de entrega.</div>
          </div>
          <div className="card" style={{borderRadius:14}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:14,marginBottom:10}}>Calendario</div>
            {[{l:'Dia 01 a 03',v:'Entrega do fechamento do mes anterior'},{l:'Dia 04 a 05',v:'Wayzen valida o LOA'},{l:'Dia 10',v:'Pagamento da taxa e participacao'}].map((x,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',gap:10,padding:'8px 0',borderBottom:'1px solid var(--divider)'}}>
                <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{x.l}</span>
                <span style={{fontSize:11,color:'var(--text)',textAlign:'right'}}>{x.v}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{borderRadius:14}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:14,marginBottom:8}}>O que esta incluido</div>
            {['Especialista alocado durante os 4 sprints','Playbook e scripts desenvolvidos','Operacao comercial instalada e rodando','Treinamento e transferencia do metodo','Contratacao do operador dedicado ao final'].map((t,i)=>(
              <div key={i} className="ci">
                <div className="ci-icon"><Ic n="ck" s={11} c="var(--accent2)"/></div>
                <div style={{fontSize:11,color:'var(--text)',lineHeight:1.6}}>{t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </SlideShell>
  );
}
// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({onNew,saved}){
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:24,padding:32,position:'relative',overflow:'hidden'}}>
      <div className="orb" style={{width:600,height:600,background:'radial-gradient(circle,rgba(148,0,211,.14),transparent 70%)',top:-200,right:-200}}/>
      <div className="orb" style={{width:400,height:400,background:'radial-gradient(circle,rgba(204,0,255,.08),transparent 70%)',bottom:-100,left:-100}}/>
      <div className="au"><WzLogo size={40}/></div>
      <div className="au1" style={{textAlign:'center'}}>
        <h1 style={{fontFamily:'var(--font-h)',fontSize:'clamp(2rem,5vw,3.5rem)',fontWeight:800,letterSpacing:'-.03em',lineHeight:1.1}}>Proposta Comercial</h1>
        <p style={{color:'var(--muted)',fontSize:15,marginTop:10,lineHeight:1.7}}>Monte sua proposta personalizada enquanto conversa com o cliente.</p>
      </div>
      <div className="au2" style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}>
        <button className="btn btn-p btn-lg" onClick={onNew}><Ic n="pl" s={16}/> Nova Proposta</button>
        {saved.length>0&&<button className="btn btn-s btn-lg" onClick={()=>{}}><Ic n="usr" s={16}/> {saved.length} salva{saved.length>1?'s':''}</button>}
      </div>
    </div>
  );
}

// ─── FORM WIZARD ─────────────────────────────────────────────────────────────
function FormWizard({client,setClient,diag,setDiag,onComplete}){
  const [phase,setPhase]=useState('ident');
  const phases=['ident','foco','diag'];
  const idx=phases.indexOf(phase);
  const canNext={ident:!!(client.empresa&&client.decisor),foco:!!(client.produto),diag:true};
  const next=()=>{if(idx<phases.length-1)setPhase(phases[idx+1]);else onComplete();};
  return(
    <div className="shell">
      <Sidebar client={client} diag={diag} plan={null} phase={phase} onPhase={setPhase}/>
      <div className="main">
        <div className="top-bar no-print">
          <WzLogo size={22}/>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {phases.map((p,i)=><div key={p} className={`step-dot ${phase===p?'active':i<idx?'done':''}`} onClick={()=>setPhase(p)}/>)}
          </div>
          <div style={{display:'flex',gap:6}}>
            {idx>0&&<button className="btn btn-g btn-sm" onClick={()=>setPhase(phases[idx-1])}><Ic n="al" s={13}/> Voltar</button>}
            <button className="btn btn-p btn-sm" onClick={next} disabled={!canNext[phase]} style={{opacity:canNext[phase]?1:.5}}>
              {idx===phases.length-1?<><Ic n="pr" s={13}/> Ver Apresentação</>:<>Próximo <Ic n="ar" s={13}/></>}
            </button>
          </div>
        </div>
        <div className="scroll" style={{flex:1}}>
          {phase==='ident'&&<PhaseIdent c={client} sc={setClient}/>}
          {phase==='foco'&&<PhaseFoco c={client} sc={setClient}/>}
          {phase==='diag'&&<PhaseDiag d={diag} sd={setDiag}/>}
        </div>
      </div>
    </div>
  );
}

// ─── PRESENTATION ────────────────────────────────────────────────────────────
function Presentation({client,diag,sim,plan,setPlan,onEdit}){
  const [slide,setSlide]=useState(0);
  const TOTAL=10;

  useEffect(()=>{
    const h=e=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown')setSlide(s=>Math.min(s+1,TOTAL-1));
      if(e.key==='ArrowLeft'||e.key==='ArrowUp')setSlide(s=>Math.max(s-1,0));
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  const slides=[
    ()=><Slide1 client={client}/>,
    ()=><Slide2/>,
    ()=><Slide3 client={client}/>,
    ()=><Slide4/>,
    ()=><Slide5 diag={diag}/>,
    ()=><Slide6/>,
    ()=><Slide7/>,
    ()=><Slide8/>,
    ()=><Slide9/>,
    ()=><Slide10 selectedPlan={plan} onSelect={setPlan} diag={diag} sim={sim}/>,
  ];

  const titles=['Capa','Como Trabalhamos','Jornada Completa','Nosso Time','O que Instalamos','Resultados','Diferenciais','4 Sprints','Sua Empresa','Investimento'];

  const handleCopy=()=>{
    const p=PLANS.find(x=>x.id===plan)||PLANS[1];
    const msg=
`*Proposta Wayzen: ${client.empresa}*\n\n`+
`Olá, ${client.decisor}!\n\n`+
`A Wayzen entra dentro da sua operação: não manda relatório por e-mail. A nossa presença no dia a dia garante que o processo de aquisição, conversão e retenção de alunos aconteça de verdade.\n\n`+
`Atuamos em 3 frentes:\n`+
`📣 Captação: leads qualificados com especialista em marketing\n`+
`🎯 Conversão: funil, scripts e follow-up instalados em campo\n`+
`📈 LTV: retenção e crescimento de receita por aluno (em estruturação)\n\n`+
`Plano selecionado: ${p.label}\n`+
`Taxa operacional: ${p.taxa}\n`+
`Participação no LOA: ${p.loa}%\n\n`+
`Próximo passo: alinhar acessos e data de início.\n\n`+
`Wayzen`;
    navigator.clipboard.writeText(msg).then(()=>alert('Mensagem copiada!')).catch(()=>alert('Copie manualmente.'));
  };

  return(
    <div style={{width:'100vw',height:'100vh',background:'var(--bg)',position:'relative',overflow:'hidden'}}>
      <div className="no-print" style={{position:'fixed',top:0,left:0,right:0,zIndex:50,padding:'10px 24px',background:'rgba(5,0,8,.85)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--divider)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <WzLogo size={20}/>
        <div style={{display:'flex',gap:4,alignItems:'center',overflowX:'auto'}}>
          {titles.map((t,i)=>(
            <button key={i} onClick={()=>setSlide(i)} style={{background:slide===i?'var(--accent-soft)':'none',border:'none',cursor:'pointer',padding:'4px 10px',borderRadius:100,color:slide===i?'var(--text)':'var(--muted)',fontSize:11,fontWeight:slide===i?600:400,transition:'all .15s',fontFamily:'var(--font-b)',whiteSpace:'nowrap'}}>{i+1}. {t}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button className="btn btn-g btn-sm" onClick={onEdit}><Ic n="ed" s={13}/> Editar</button>
          <button className="btn btn-s btn-sm" onClick={handleCopy}><Ic n="cp" s={13}/> WA</button>
          <button className="btn btn-p btn-sm" onClick={()=>window.print()}><Ic n="dn" s={13}/> PDF</button>
        </div>
      </div>
      <div style={{paddingTop:52,height:'100vh'}}>
        <div key={slide} className="ai" style={{position:'relative',height:'calc(100vh - 52px)',overflow:'hidden'}}>
          {slides[slide]()}
        </div>
      </div>
      <div className="pres-nav no-print">
        <button className="prev-btn" onClick={()=>setSlide(s=>Math.max(0,s-1))}><Ic n="al" s={18}/></button>
        <div className="slide-counter">{slide+1}/{TOTAL}</div>
        <button className="next-btn" onClick={()=>setSlide(s=>Math.min(TOTAL-1,s+1))}><Ic n="ar" s={18}/></button>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('home');
  const [client,setClient]=useLS('wz_c3',defClient);
  const [diag,setDiag]=useLS('wz_d3',defDiag);
  const [sim,setSim]=useLS('wz_s3',defSim);
  const [plan,setPlan]=useLS('wz_p3','padrao');
  const [saved,setSaved]=useLS('wz_sv3',[]);

  if(screen==='home') return <Home onNew={()=>setScreen('form')} saved={saved}/>;
  if(screen==='form') return <FormWizard client={client} setClient={setClient} diag={diag} setDiag={setDiag} onComplete={()=>setScreen('pres')}/>;
  if(screen==='pres') return <Presentation client={client} diag={diag} sim={sim} plan={plan} setPlan={setPlan} onEdit={()=>setScreen('form')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
